name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distribution bundle
        run: npm run build

      - name: Compute release metadata
        id: meta
        env:
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          short_sha="${HEAD_SHA::7}"
          tag="main-${RUN_NUMBER}-${short_sha}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "name=specflow main ${RUN_NUMBER} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Pack release tarball
        id: pack
        run: |
          filename="$(npm pack --json | node -e 'const chunks=[]; process.stdin.on("data", (chunk) => chunks.push(chunk)); process.stdin.on("end", () => { const parsed = JSON.parse(Buffer.concat(chunks).toString("utf8")); process.stdout.write(parsed[0].filename); });')"
          mv "$filename" specflow-node.tgz
          echo "asset=specflow-node.tgz" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          files: ${{ steps.pack.outputs.asset }}
          body: |
            Install the latest prebuilt release with:

            ```bash
            npm install -g --force https://github.com/${{ github.repository }}/releases/latest/download/specflow-node.tgz
            ```

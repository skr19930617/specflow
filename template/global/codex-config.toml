# Codex configuration for specflow
# このファイルを ~/.codex/config.toml に配置またはマージする

# --- 要変更 ---
# 使用するモデル。利用可能なモデルに合わせて変更
model = "gpt-5.4"

# 推論の深さ。"low" | "medium" | "high" | "xhigh"
model_reasoning_effort = "xhigh"

# レスポンスのスタイル
personality = "pragmatic"

# --- 要変更 ---
# trust するディレクトリ。自分の作業ディレクトリに変更
# specflow が codex exec を呼ぶリポジトリのパスを含めること
[trust]
"/Users/YOUR_USERNAME" = "trusted"

# GitHub プラグイン（gh 連携が必要な場合）
[plugins]
github = true
